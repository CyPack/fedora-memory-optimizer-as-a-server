# oomd-reconciler — containers to protect from systemd-oomd kill (omit/avoid).
# EDIT for your host: list YOUR critical containers. Examples below are generic.
#
# format:  <match-type>:<value>   <omit|avoid>
#   match-type: name | name-regex | swarm-service | compose-service
#   omit  = remove from oomd candidate pool entirely (stateful DB / object store — prevent data loss)
#   avoid = last-resort only (dev/demo DB — don't blind oomd entirely; man page: use omit sparingly)

# ── Examples (replace with your own) ──
# name-regex:postgres        omit
# name-regex:redis           omit
# name-regex:(minio|mariadb|mongo)  omit
# swarm-service:my-db        omit
# compose-service:db         omit
# name:dev-throwaway-db      avoid
